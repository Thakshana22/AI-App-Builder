<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colourful Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>Colourful Todo App</h1>
        </header>

        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Add a new task...">
            <button type="submit" id="todo-button">Add Task</button>
        </form>

        <ul id="todo-list">
            <!-- Todo items will be added here dynamically -->
        </ul>

        <section class="filters-actions">
            <div class="filter-buttons">
                <button id="filter-all" data-filter="all">All</button>
                <button id="filter-active" data-filter="active">Active</button>
                <button id="filter-completed" data-filter="completed">Completed</button>
            </div>
            <button id="clear-completed-button">Clear Completed</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
